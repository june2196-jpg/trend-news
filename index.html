<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trend News</title>
  <meta
    name="description"
    content="Google Trends 키워드와 관련 뉴스를 Cloudflare에서 바로 확인하는 정적 페이지"
  >
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="page-shell">
    <main class="app-shell">
      <header class="topbar">
        <a class="brand" href="./">Trend News</a>
        <div class="topbar-actions">
          <label class="country-switcher" for="geo-select">
            <span>지역</span>
            <select id="geo-select" aria-label="트렌드 지역 선택">
              <option value="KR">KR</option>
              <option value="US">US</option>
              <option value="JP">JP</option>
            </select>
          </label>
        </div>
      </header>

      <section class="hero">
        <p class="eyebrow" id="hero-eyebrow">Google Trends</p>
        <h1 id="hero-title">지금 많이 검색되는 키워드</h1>
        <p class="hero-meta" id="hero-meta"></p>
      </section>

      <section class="view view-active" id="trend-view" aria-labelledby="hero-title">
        <div class="section-head">
          <h2>실시간 트렌드</h2>
          <button class="ghost-button" id="refresh-button" type="button">새로고침</button>
        </div>
        <div class="status-banner" id="trend-status"></div>
        <div class="trend-grid" id="trend-list"></div>
      </section>

      <section class="view" id="detail-view" aria-labelledby="detail-title" hidden>
        <div class="detail-header">
          <a class="back-link" href="./" id="back-link">목록으로</a>
          <div>
            <p class="eyebrow">Related News</p>
            <h2 id="detail-title">상세 뉴스</h2>
            <p class="detail-subtitle" id="detail-subtitle"></p>
          </div>
        </div>
        <div class="status-banner" id="detail-status"></div>
        <div class="news-list" id="news-list"></div>
      </section>
    </main>
  </div>

  <script defer src="./main.js"></script>
</body>
</html>
